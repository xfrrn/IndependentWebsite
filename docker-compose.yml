services:
  medusa-db:
    image: postgres:15-alpine
    container_name: medusa-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa_password
      POSTGRES_DB: medusa_db
    ports:
      - "5433:5432"
    volumes:
      - medusa-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d medusa_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  medusa-redis:
    image: redis:7-alpine
    container_name: medusa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - medusa-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  medusa-backend:
    build:
      context: ./medusa-backend
      dockerfile: Dockerfile
    container_name: medusa-backend
    restart: unless-stopped
    depends_on:
      medusa-db:
        condition: service_healthy
      medusa-redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 9000
      DATABASE_URL: postgres://medusa:medusa_password@medusa-db:5432/medusa_db
      REDIS_URL: redis://medusa-redis:6379
      STORE_CORS: http://localhost:8000,http://127.0.0.1:8000,http://medusa-frontend:8000
      ADMIN_CORS: http://localhost:9000,http://127.0.0.1:9000,http://medusa-backend:9000
      AUTH_CORS: http://localhost:8000,http://127.0.0.1:8000,http://localhost:9000,http://127.0.0.1:9000,http://medusa-frontend:8000,http://medusa-backend:9000
      JWT_SECRET: supersecret
      COOKIE_SECRET: supersecret
      CONTENT_ADMIN_SECRET: local-content-secret
      AUTO_MIGRATE: "true"
      AUTO_SEED: "true"
    ports:
      - "9000:9000"
    volumes:
      - ./medusa-backend:/app
      - medusa-backend-node-modules:/app/node_modules
      - medusa-backend-build:/app/.medusa

  medusa-frontend:
    build:
      context: ./medusa-frontend
      dockerfile: Dockerfile
    container_name: medusa-frontend
    restart: unless-stopped
    depends_on:
      - medusa-backend
    environment:
      NODE_ENV: development
      MEDUSA_BACKEND_URL: http://medusa-backend:9000
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_b42edf3b5d8fd0d251d1575bbe968469d736ed0e7b6e491299fe1c3170fa8bcd
      NEXT_PUBLIC_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_DEFAULT_REGION: us
      NEXT_PUBLIC_STRIPE_KEY: ""
      NEXT_PUBLIC_MEDUSA_PAYMENTS_PUBLISHABLE_KEY: ""
      NEXT_PUBLIC_MEDUSA_PAYMENTS_ACCOUNT_ID: ""
      REVALIDATE_SECRET: supersecret
      CONTENT_ADMIN_SECRET: local-content-secret
    ports:
      - "8000:8000"
    volumes:
      - ./medusa-frontend:/app
      - medusa-frontend-node-modules:/app/node_modules
      - medusa-frontend-next:/app/.next
    command: npm run dev -- -H 0.0.0.0

volumes:
  medusa-db-data:
  medusa-redis-data:
  medusa-backend-node-modules:
  medusa-backend-build:
  medusa-frontend-node-modules:
  medusa-frontend-next:
