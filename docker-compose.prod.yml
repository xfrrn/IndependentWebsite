services:
  caddy:
    image: caddy:2-alpine
    container_name: kidgofun-caddy
    restart: unless-stopped
    depends_on:
      medusa-backend:
        condition: service_healthy
      medusa-frontend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      PRIMARY_DOMAIN: ${PRIMARY_DOMAIN}
      SECONDARY_DOMAIN: ${SECONDARY_DOMAIN}
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3

  medusa-db:
    image: postgres:15-alpine
    container_name: kidgofun-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - medusa-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  medusa-redis:
    image: redis:7-alpine
    container_name: kidgofun-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - medusa-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  medusa-backend:
    build:
      context: ./medusa-backend
      dockerfile: Dockerfile.prod
      args:
        NODE_IMAGE: ${NODE_IMAGE:-docker.m.daocloud.io/library/node:20-bookworm}
    container_name: kidgofun-backend
    restart: unless-stopped
    depends_on:
      medusa-db:
        condition: service_healthy
      medusa-redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 9000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@medusa-db:5432/${POSTGRES_DB}?sslmode=disable
      PGSSLMODE: disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@medusa-redis:6379
      STORE_CORS: ${STORE_CORS}
      ADMIN_CORS: ${ADMIN_CORS}
      AUTH_CORS: ${AUTH_CORS}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      CONTENT_ADMIN_SECRET: ${CONTENT_ADMIN_SECRET}
      STOREFRONT_BASE_URL: ${STOREFRONT_BASE_URL}
      DEFAULT_STORE_COUNTRY_CODE: ${DEFAULT_STORE_COUNTRY_CODE}
      ENABLE_DEV_PUBLISHABLE_KEY_ENDPOINT: ${ENABLE_DEV_PUBLISHABLE_KEY_ENDPOINT:-false}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-false}
      AUTO_SEED: ${AUTO_SEED:-false}
      AUTO_ADMIN_USER: ${AUTO_ADMIN_USER:-false}
    expose:
      - "9000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:9000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  medusa-frontend:
    build:
      context: ./medusa-frontend
      dockerfile: Dockerfile.prod
      args:
        NODE_IMAGE: ${NODE_IMAGE:-docker.m.daocloud.io/library/node:20-bookworm}
        MEDUSA_BACKEND_URL: http://medusa-backend:9000
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY}
        NEXT_PUBLIC_DEFAULT_REGION: ${NEXT_PUBLIC_DEFAULT_REGION}
        SKIP_STATIC_GENERATION: "true"
    container_name: kidgofun-frontend
    restart: unless-stopped
    depends_on:
      medusa-backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      MEDUSA_BACKEND_URL: http://medusa-backend:9000
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY}
      NEXT_PUBLIC_DEFAULT_REGION: ${NEXT_PUBLIC_DEFAULT_REGION}
      NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY}
      NEXT_PUBLIC_MEDUSA_PAYMENTS_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PAYMENTS_PUBLISHABLE_KEY}
      NEXT_PUBLIC_MEDUSA_PAYMENTS_ACCOUNT_ID: ${NEXT_PUBLIC_MEDUSA_PAYMENTS_ACCOUNT_ID}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
      CONTENT_MANAGER_KEY: ${CONTENT_MANAGER_KEY}
      CONTENT_ADMIN_SECRET: ${CONTENT_ADMIN_SECRET}
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8000').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  caddy-data:
  caddy-config:
  medusa-db-data:
  medusa-redis-data:
